name: optimized-retail-lakehouse

services:
  kafka:
    image: ${KAFKA_IMAGE}
    hostname: kafka

    ports:
      - "9092:9092"

    environment:
      KAFKA_NODE_ID: 1

      KAFKA_PROCESS_ROLES: "broker,controller"

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: >-
        CONTROLLER:PLAINTEXT,
        INTERNAL:PLAINTEXT,
        EXTERNAL:PLAINTEXT

      KAFKA_LISTENERS: >-
        CONTROLLER://:29093,
        INTERNAL://:19092,
        EXTERNAL://:9092

      KAFKA_ADVERTISED_LISTENERS: >-
        INTERNAL://kafka:19092,
        EXTERNAL://localhost:9092

      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"

      CLUSTER_ID: ${KAFKA_CLUSTER_ID}

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_MIN_ISR: 1

      KAFKA_LOG_DIRS: /var/lib/kafka/data

    volumes:
      - kafka_data:/var/lib/kafka/data

    healthcheck:
      test:
        - CMD-SHELL
        - >-
          /opt/kafka/bin/kafka-broker-api-versions.sh
          --bootstrap-server localhost:19092
          >/dev/null 2>&1
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

    networks:
      - lakehouse_network

  postgres:
    image: ${POSTGRES_IMAGE}
    hostname: postgres

    ports:
      - "5432:5432"

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_postgres.sql:/docker-entrypoint-initdb.d/001-init-postgres.sql:ro

    healthcheck:
      test:
        - CMD-SHELL
        - >-
          pg_isready
          -U $${POSTGRES_USER}
          -d $${POSTGRES_DB}
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

    shm_size: 128mb

    networks:
      - lakehouse_network

  minio:
    build:
      context: .
      dockerfile: docker/minio/Dockerfile
      args:
        MINIO_RELEASE: ${MINIO_RELEASE}
    image: ${MINIO_IMAGE}
    hostname: minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command:
      - server
      - /data
      - --console-address
      - ":9001"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost:9000/minio/health/live
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - lakehouse_network
  
  airflow:
    image: ${AIRFLOW_IMAGE}
    hostname: airflow

    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"

      # Khai báo user và role cho Simple Auth Manager
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: "${AIRFLOW_ADMIN_USERNAME}:admin"

      # Chỉ định file chứa password
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE: >-
        /opt/airflow/config/simple_auth_manager_passwords.json

      AIRFLOW_ADMIN_USERNAME: ${AIRFLOW_ADMIN_USERNAME}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD}

    command:
      - bash
      - -c
      - |
        python - <<'PY'
        import json
        import os
        from pathlib import Path

        username = os.environ["AIRFLOW_ADMIN_USERNAME"]
        password = os.environ["AIRFLOW_ADMIN_PASSWORD"]

        path = Path(
            "/opt/airflow/config/simple_auth_manager_passwords.json"
        )
        path.parent.mkdir(parents=True, exist_ok=True)
        path.write_text(
            json.dumps({username: password}),
            encoding="utf-8",
        )
        PY

        exec airflow standalone

    ports:
      - "${AIRFLOW_WEB_PORT:-8088}:8080"

    volumes:
      - ./orchestration/dags:/opt/airflow/dags
      - ./orchestration/logs:/opt/airflow/logs
      - ./orchestration/plugins:/opt/airflow/plugins
      - ./orchestration/config:/opt/airflow/config

    user: "${AIRFLOW_UID:-50000}:0"

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - lakehouse_network

    restart: unless-stopped

  spark:
    image: ${SPARK_IMAGE}
    hostname: spark
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
      --host spark
      --port 7077
      --webui-port 8080
    ports:
      - "${SPARK_MASTER_WEBUI_PORT:-8080}:8080"
      - "${SPARK_MASTER_PORT:-7077}:7077"
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - lakehouse_network

  streamlit:
    image: ${STREAMLIT_IMAGE}
    hostname: streamlit
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir streamlit &&
             streamlit run monitoring/dashboard.py
             --server.address=0.0.0.0
             --server.port=8501"
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"
    volumes:
      - ./monitoring:/app/monitoring:ro
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - lakehouse_network

networks:
  lakehouse_network:
    driver: bridge

volumes:
  kafka_data:
  postgres_data:
  minio_data: